name: Provision Sheet

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target sheet (dev = .env.development, prod = .env.production)'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Provision sheet
        run: npm run setup:${{ inputs.environment }}
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ inputs.environment == 'prod' && secrets.GOOGLE_SHEET_ID || secrets.DEV_GOOGLE_SHEET_ID }}
