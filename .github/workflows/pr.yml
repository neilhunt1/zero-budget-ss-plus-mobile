name: PR

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Upload test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Vitest Unit Tests
          path: test-results/junit.xml
          reporter: jest-junit
          fail-on-error: true

  prepare-dev-sheet:
    name: Provision dev sheet
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Provision dev sheet
        run: npm run setup:dev
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.DEV_GOOGLE_SHEET_ID }}

      - name: Sync prod data to dev
        run: npm run sync-from-prod-to-dev
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          DEV_GOOGLE_SHEET_ID: ${{ secrets.DEV_GOOGLE_SHEET_ID }}
          PROD_GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: prepare-dev-sheet
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.DEV_GOOGLE_SHEET_ID }}

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: integration-tests
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Reset test sheet
        run: npm run setup:test && npm run seed:test
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID_TEST }}

      - name: Build app for E2E
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID_TEST }}
          VITE_BASE_PATH: /

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_SERVICE_ACCOUNT_TOKEN: ${{ secrets.E2E_SERVICE_ACCOUNT_TOKEN }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14
