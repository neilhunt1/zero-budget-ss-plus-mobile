name: PR

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Upload test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Vitest Unit Tests
          path: test-results/junit.xml
          reporter: jest-junit
          fail-on-error: true

  validate-dev-schema:
    name: Validate dev schema
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      # Provision dev sheet schema only — confirms migrations work.
      # Does NOT sync prod data: dev is a developer sandbox and should
      # not be overwritten by CI. Run sync-from-prod-to-dev manually
      # whenever you want a prod-like snapshot in dev.
      - name: Provision dev sheet schema
        run: npm run setup:dev
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.DEV_GOOGLE_SHEET_ID }}

  test-sheet:
    name: Integration + E2E tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      # Reset test sheet to a clean, known state before all tests that use it.
      # Integration tests and E2E tests both run against this sheet — integration
      # tests clean up their own rows (by external_id) in afterAll.
      - name: Reset test sheet
        run: npm run setup:test && npm run seed:test
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID_TEST }}

      - name: Run integration tests
        run: npm run test:integration
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID_TEST }}

      - name: Build app for E2E
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID_TEST }}
          VITE_BASE_PATH: /

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID_TEST }}
          E2E_SERVICE_ACCOUNT_TOKEN: ${{ secrets.E2E_SERVICE_ACCOUNT_TOKEN }}
          # Belt-and-suspenders: auth.ts falls back to this if E2E_SERVICE_ACCOUNT_TOKEN is empty
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14
