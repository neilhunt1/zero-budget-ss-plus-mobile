name: PR

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Upload test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Vitest Unit Tests
          path: test-results/junit.xml
          reporter: jest-junit
          fail-on-error: true

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Provision dev sheet
        run: npm run setup:dev
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.DEV_GOOGLE_SHEET_ID }}

      - name: Sync prod data to dev
        run: npm run sync-from-prod-to-dev
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          DEV_GOOGLE_SHEET_ID: ${{ secrets.DEV_GOOGLE_SHEET_ID }}
          PROD_GOOGLE_SHEET_ID: ${{ secrets.PROD_GOOGLE_SHEET_ID }}

      - name: Run integration tests
        run: npm run test:integration
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.DEV_GOOGLE_SHEET_ID }}
